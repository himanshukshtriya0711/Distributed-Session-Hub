kind = "web"
previewPath = "/"
title = "Distributed Session Management Demo"
version = "1.0.0"
id = "artifacts/session-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23090
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/session-demo run dev"

[services.env]
PORT = "23090"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/session-demo", "run", "build"]
publicDir = "artifacts/session-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
